[settings]
# Write interval in milliseconds (to out-spam EC control)
write_interval_ms=850
# Temperature polling interval in seconds
poll_interval_sec=2
# EMA smoothing coefficient (lower = smoother fan reaction)
ema_alpha=0.05
# Hysteresis in degrees (protection against sudden drops)
hysteresis=5

[cpu_curve]
# Format: Temperature=FanSpeed (%)
0=15
75=45
80=70
85=85
90=100

[gpu_curve]
# Format: Temperature=FanSpeed (%)
0=15
75=45
80=70
85=85
90=100
