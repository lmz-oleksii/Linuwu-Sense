# Linuwu-Sense Fan Curve Daemon — Default Configuration
#
# polling_interval: how often (in seconds) to read temperatures and update fans.
# hysteresis:       how many °C the temperature must DROP below the last trigger
#                   point before the fan speed is allowed to decrease.
#                   This prevents fans from constantly hunting up/down.
#
# cpu / gpu:
#   curve: list of { temp, fan } breakpoints.
#     temp — temperature in °C
#     fan  — target fan speed in % (0 = restore auto/BIOS control)
#
# Fan speed is determined by a step curve.
# The fan speed will only increase when the temperature reaches the NEXT breakpoint.
# Below the first breakpoint → first fan value is used.
# Above the last  breakpoint → last  fan value is used.

polling_interval: 3
hysteresis: 5

cpu:
  curve:
    - temp: 30
      fan: 1
      
    - temp: 40
      fan: 5

    - temp: 65
      fan: 25

    - temp: 70
      fan: 45

    - temp: 80
      fan: 70

    - temp: 90
      fan: 85

    - temp: 95
      fan: 100

gpu:
  curve:
    - temp: 30
      fan: 1

    - temp: 40
      fan: 1

    - temp: 65
      fan: 25

    - temp: 70
      fan: 45

    - temp: 80
      fan: 70

    - temp: 90
      fan: 85

    - temp: 95
      fan: 100